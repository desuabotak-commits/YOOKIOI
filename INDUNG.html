<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Pesan Anonim</title>
    <!-- Tailwind CSS untuk Desain Bagus & Modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen text-gray-800 flex flex-col items-center py-10 px-4">

    <!-- Container Utama -->
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl p-6 mb-6">
        <h1 class="text-2xl font-bold text-center text-purple-700 mb-2">🤫 Kirim Pesan Anonim</h1>
        <p class="text-gray-500 text-sm text-center mb-6">Tulis apa saja, tidak ada yang tahu siapa kamu.</p>

        <!-- Form Kirim Pesan -->
        <form id="msgForm" class="space-y-4">
            <textarea id="msgInput" rows="3" placeholder="Tulis pesan rahasiamu di sini..." required
                class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none resize-none"></textarea>
            <button type="submit" 
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-md">
                Kirim Anonim ✨
            </button>
        </form>
    </div>

    <!-- Tempat Pesan Muncul (Dilihat Semua Orang) -->
    <div class="w-full max-w-lg">
        <h2 class="text-white font-semibold text-lg mb-3 flex items-center gap-2">
            💬 Pesan Masuk Terbaru
        </h2>
        <div id="messagesContainer" class="space-y-4 max-h-[500px] overflow-y-auto pr-1">
            <!-- Pesan akan otomatis muncul di sini -->
            <p class="text-white text-center text-sm opacity-75">Memuat pesan...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ GANTI DENGAN FIREBASE CONFIG MILIKMU KAK
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const msgCollection = collection(db, "pesan_anonim");

        const msgForm = document.getElementById("msgForm");
        const msgInput = document.getElementById("msgInput");
        const messagesContainer = document.getElementById("messagesContainer");

        // 1. Fungsi Kirim Pesan ke Database (Tanpa Nama Pengirim)
        msgForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            
            if (text) {
                try {
                    await addDoc(msgCollection, {
                        pesan: text,
                        waktu: serverTimestamp()
                    });
                    msgInput.value = ""; // Kosongkan input setelah kirim
                } catch (error) {
                    alert("Gagal mengirim pesan: " + error.message);
                }
            }
        });

        // 2. Fungsi Ambil Pesan Real-time (Always Online & Langsung Update)
        const q = query(msgCollection, orderBy("waktu", "desc"));
        onSnapshot(q, (snapshot) => {
            messagesContainer.innerHTML = "";
            
            if (snapshot.empty) {
                messagesContainer.innerHTML = `<p class="text-white text-center text-sm opacity-75">Belum ada pesan. Jadi yang pertama!</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const waktuFormated = data.waktu ? new Date(data.waktu.toDate()).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) : "Baru saja";
                
                const card = document.createElement("div");
                card.className = "bg-white/90 backdrop-blur-sm p-4 rounded-xl shadow-md border-l-4 border-purple-500 animate-fade-in";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-purple-600 uppercase tracking-wide">🕵️ Anonim</span>
                        <span class="text-[10px] text-gray-400">${waktuFormated}</span>
                    </div>
                    <p class="text-gray-700 text-sm break-words">${escapeHTML(data.pesan)}</p>
                `;
                messagesContainer.appendChild(card);
            });
        });

        // Keamanan simpel agar orang tidak bisa usil memasukkan script HTML
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
